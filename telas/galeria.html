            <script>

        const carrosseis =
        document.querySelectorAll(".carrossel");

        const nextBtns =
        document.querySelectorAll(".next");

        const prevBtns =
        document.querySelectorAll(".prev");

        carrosseis.forEach((carrossel, index) => {

            nextBtns[index].onclick = () => {

                carrossel.scrollLeft += 600;

            };

            prevBtns[index].onclick = () => {

                carrossel.scrollLeft -= 600;

            };

        });
